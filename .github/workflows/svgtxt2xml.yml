name: Replace crDroid Logo Path

on:
  workflow_dispatch:
    inputs:
      new_path_data:
        description: 'Paste pathData baru di sini'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  replace-path:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update XML File (Binary Mode)
        shell: python
        run: |
          import os
          import re

          target_file = "ic_crdroid_logo.xml"
          # Ambil input dan bersihkan dari karakter whitespace/newline
          new_path = r"""${{ github.event.inputs.new_path_data }}""".strip().replace('\n', '').replace('\r', '')
          
          if os.path.exists(target_file):
              # Baca file dalam mode binary (rb) buat ngehindarin UnicodeDecodeError
              with open(target_file, 'rb') as f:
                  content_bytes = f.read()
              
              # Convert ke string, abaikan karakter yang gak bisa didecode (errors='ignore')
              content = content_bytes.decode('utf-8', errors='ignore')
              
              # Regex buat cari android:pathData="..." dan ganti isinya
              pattern = r'android:pathData="[^"]*"'
              replacement = f'android:pathData="{new_path}"'
              
              new_content = re.sub(pattern, replacement, content)
              
              # Tulis balik ke file dalam format utf-8 yang bersih
              with open(target_file, 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print(f"Berhasil update {target_file} dan bersihkan karakter aneh.")
          else:
              print(f"File {target_file} gak ketemu!")
              exit(1)

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ic_crdroid_logo.xml
          
          if git diff --staged --quiet; then
            echo "Gak ada perubahan, path mungkin sama."
          else
            git commit -m "Update logo pathData via GitHub Action (Fix Encoding)"
            git push
          fi
