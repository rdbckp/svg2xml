name: Replace crDroid Logo Path (Binary Format)

on:
  workflow_dispatch:
    inputs:
      new_path_data:
        description: 'Paste pathData baru di sini'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-binary-xml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Locate and Link AAPT2
        run: |
          # Cari lokasi aapt2 di dalam Android SDK bawaan GitHub Runner
          AAPT2_PATH=$(find $ANDROID_HOME/build-tools -name aapt2 -type f | sort -r | head -n 1)
          if [ -z "$AAPT2_PATH" ]; then
            echo "AAPT2 gak ketemu, brooohhh!"
            exit 1
          fi
          echo "Pake AAPT2 dari: $AAPT2_PATH"
          # Bikin symbolic link biar bisa dipanggil cuma 'aapt2'
          sudo ln -s "$AAPT2_PATH" /usr/local/bin/aapt2

      - name: Create Temporary Clean XML
        run: |
          cat <<EOF > temp_clean.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FF000000"
                  android:pathData="${{ github.event.inputs.new_path_data }}" />
          </vector>
          EOF

      - name: Compile to Binary XML
        run: |
          mkdir -p output
          # Compile ke format .flat
          aapt2 compile temp_clean.xml -o output/
          
          # Link jadi file APK sementara (pake --proto-format biar strukturnya pas)
          aapt2 link -o final_res.apk output/drawable_temp_clean.xml.flat --manifest <(echo '<manifest package="com.example.temp"/>')
          
          # Ekstrak file binary-nya (biasanya di res/drawable/...)
          unzip -p final_res.apk res/drawable/temp_clean.xml > ic_crdroid_logo.xml

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ic_crdroid_logo.xml
          
          if git diff --staged --quiet; then
            echo "Gak ada perubahan, mungkin path-nya sama."
          else
            git commit -m "Update logo to Binary XML format via AAPT2"
            git push
          fi
