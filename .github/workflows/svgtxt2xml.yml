name: Replace crDroid Logo Path (Binary Format)

on:
  workflow_dispatch:
    inputs:
      new_path_data:
        description: 'Paste pathData baru di sini'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-binary-xml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Locate and Link AAPT2
        run: |
          AAPT2_PATH=$(find $ANDROID_HOME/build-tools -name aapt2 -type f | sort -r | head -n 1)
          if [ -z "$AAPT2_PATH" ]; then exit 1; fi
          sudo ln -s "$AAPT2_PATH" /usr/local/bin/aapt2

      - name: Prepare Android Resource Folder
        run: |
          # aapt2 butuh struktur folder res/drawable/
          mkdir -p res/drawable
          cat <<EOF > res/drawable/temp_clean.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FF000000"
                  android:pathData="${{ github.event.inputs.new_path_data }}" />
          </vector>
          EOF

      - name: Compile to Binary XML
        run: |
          mkdir -p output_compiled
          # Compile folder res/
          aapt2 compile --dir res/ -o output_compiled/
          
          # Link jadi APK sementara
          aapt2 link -o final_res.apk output_compiled/*.flat --manifest <(echo '<manifest package="com.example.temp"/>')
          
          # Cek isi APK buat debugging (liat path aslinya)
          unzip -l final_res.apk
          
          # Ekstrak file binary. aapt2 biasanya naruh di res/drawable/ atau res/drawable-v4/
          # Kita pake wildcard biar aman
          unzip -p final_res.apk "res/drawable*/temp_clean.xml" > ic_crdroid_logo.xml

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ic_crdroid_logo.xml
          
          if git diff --staged --quiet; then
            echo "Gak ada perubahan."
          else
            git commit -m "Update logo to Binary XML format (Fixed Path)"
            git push
          fi
