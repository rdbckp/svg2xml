name: Replace crDroid Logo Path (Binary Format)

on:
  workflow_dispatch:
    inputs:
      new_path_data:
        description: 'Paste pathData baru di sini'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-binary-xml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Locate Android Tools
        run: |
          # Cari AAPT2
          AAPT2_PATH=$(find $ANDROID_HOME/build-tools -name aapt2 -type f | sort -r | head -n 1)
          sudo ln -s "$AAPT2_PATH" /usr/local/bin/aapt2
          
          # Cari android.jar (penting buat definisi atribut)
          ANDROID_JAR=$(find $ANDROID_HOME/platforms -name android.jar | sort -r | head -n 1)
          echo "ANDROID_JAR=$ANDROID_JAR" >> $GITHUB_ENV

      - name: Prepare Android Resource Folder
        run: |
          mkdir -p res/drawable
          cat <<EOF > res/drawable/temp_clean.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FF000000"
                  android:pathData="${{ github.event.inputs.new_path_data }}" />
          </vector>
          EOF

      - name: Compile to Binary XML
        run: |
          mkdir -p output_compiled
          aapt2 compile --dir res/ -o output_compiled/
          
          # LINK dengan menyertakan android.jar (-I)
          aapt2 link -I ${{ env.ANDROID_JAR }} \
            -o final_res.apk \
            output_compiled/*.flat \
            --manifest <(echo '<manifest package="com.example.temp"/>')
          
          # Ekstrak file binary
          unzip -p final_res.apk "res/drawable*/temp_clean.xml" > ic_crdroid_logo.xml

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ic_crdroid_logo.xml
          
          if git diff --staged --quiet; then
            echo "Gak ada perubahan."
          else
            git commit -m "Update logo to Binary XML format (Fixed Attributes)"
            git push
          fi
