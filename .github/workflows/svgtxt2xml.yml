name: Replace crDroid Logo Path (Binary Format)

on:
  workflow_dispatch:
    inputs:
      new_path_data:
        description: 'Paste pathData baru di sini'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-binary-xml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Android SDK Tools
        run: |
          # Ambil aapt2 buat nge-compile XML ke binary
          sudo apt-get update
          sudo apt-get install -y aapt2

      - name: Create Temporary Clean XML
        run: |
          # Bikin template XML teks biasa
          cat <<EOF > temp_clean.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FF000000"
                  android:pathData="${{ github.event.inputs.new_path_data }}" />
          </vector>
          EOF

      - name: Compile to Binary XML
        run: |
          # 1. Compile file mentah jadi .flat
          aapt2 compile temp_clean.xml -o ./output/
          
          # 2. Link file .flat jadi binary XML beneran
          # Kita pakai trik 'link' supaya dapet format binary yang bisa dibaca Android
          aapt2 link --proto-format -o final_res.apk ./output/drawable_temp_clean.xml.flat
          
          # 3. Ekstrak file binary dari dalam paket (biasanya di root atau res/)
          unzip -p final_res.apk res/drawable/temp_clean.xml > ic_crdroid_logo.xml || \
          unzip -p final_res.apk temp_clean.xml > ic_crdroid_logo.xml

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ic_crdroid_logo.xml
          
          if git diff --staged --quiet; then
            echo "Gak ada perubahan."
          else
            git commit -m "Update logo to Binary XML format"
            git push
          fi
