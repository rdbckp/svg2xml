name: Extract SVG Path to TXT

on:
  workflow_dispatch:
    inputs:
      svg_filename:
        description: 'Nama file SVG di root (contoh: logo_baru.svg)'
        required: true
        default: 'logo.svg'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Extract Path Data
        run: |
          # Ambil nama file dari input
          FILE="${{ github.event.inputs.svg_filename }}"
          
          echo "Mengekstrak path dari $FILE..."
          
          # Gunakan grep & sed buat ngambil isi di dalem d="..."
          # Lalu simpan ke path_output.txt
          grep -oP '(?<= d=")[^"]*' "$FILE" > path_output.txt || echo "Path tidak ditemukan!" > path_output.txt
          
          echo "Hasil ekstraksi:"
          cat path_output.txt

      - name: Commit Hasil TXT
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add path_output.txt
          git commit -m "Update path_output.txt dari $FILE"
          git push
